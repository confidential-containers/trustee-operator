apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - script: |
      # Generate self-signed server certificate for HTTPS
      openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
        -keyout /tmp/tls.key -out /tmp/tls.crt \
        -config kbs-service-openssl.conf -passin pass: \
        -subj "/C=US/ST=MA/L=Boston/O=Red Hat/OU=Development/CN=kbs-service"

      # Create Kubernetes TLS secret for HTTPS
      kubectl create secret tls kbs-tls-secret \
        --cert=/tmp/tls.crt \
        --key=/tmp/tls.key \
        -n trustee-operator-system

      # Generate EC private key for attestation token verification (prime256v1 curve)
      openssl ecparam -name prime256v1 -genkey -noout -out /tmp/attestation.key

      # Generate self-signed certificate for attestation token verification
      openssl req -new -x509 -key /tmp/attestation.key -out /tmp/attestation.crt \
        -days 365 -subj "/CN=kbs-trustee-operator-system/O=RedHat"

      # Create Kubernetes TLS secret for attestation token verification
      kubectl create secret tls kbs-attestation-token-secret \
        --cert=/tmp/attestation.crt \
        --key=/tmp/attestation.key \
        -n trustee-operator-system

      # Clean up temporary files
      rm -f /tmp/tls.key /tmp/tls.crt /tmp/attestation.key /tmp/attestation.crt
