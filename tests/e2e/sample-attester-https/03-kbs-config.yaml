apiVersion: v1
kind: ConfigMap
metadata:
  name: kbs-config
  namespace: trustee-operator-system
data:
  kbs-config.toml: |
    [http_server]
    sockets = ["0.0.0.0:8080"]
    insecure_http = false
    private_key = "/etc/https-key/https.key"
    certificate = "/etc/https-cert/https.crt"
    worker_count = 4

    [admin]
    type = "DenyAll"
    insecure_api = false
    auth_public_key = "/etc/auth-secret/publicKey"

    [attestation_token]
    insecure_key = true

    [attestation_service]
    type = "coco_as_builtin"
    timeout = 5

    [attestation_service.attestation_token_broker]
    duration_min = 5

    [attestation_service.rvps_config]
    type = "BuiltIn"
    storage_type = "LocalJson"

    [storage_backend]
    storage_type = "LocalFs"

    [storage_backend.backends.local_fs]
    dir_path = "/opt/confidential-containers/storage"

    [storage_backend.backends.local_json]
    dir_path = "/opt/confidential-containers/storage/local_json"

    [attestation_service.verifier_config.snp_verifier]
    # Configure VCEK sources to try, in order. Defaults to [KDS].
    vcek_sources = [
        { type = "OfflineStore" },
        { type = "KDS" }
    ]

    [[plugins]]
    name = "resource"
    storage_backend_type = "kvstorage"
