apiVersion: v1
kind: ConfigMap
metadata:
  name: ita-kbs-config-grpc
  namespace: trustee-operator-system
data:
  kbs-config.toml: |
    [http_server]
    sockets = ["0.0.0.0:8080"]
    insecure_http = true
    worker_count = 4

    [admin]
    type = "DenyAll"
    insecure_api = true
    auth_public_key = "/etc/auth-secret/kbs.pem"

    [attestation_token]
    trusted_jwk_sets = ["https://portal.trustauthority.intel.com"]

    [attestation_service]
    type = "intel_ta"
    base_url = "https://api.trustauthority.intel.com"
    api_key = "tBfd5kKX2x9ahbodKV1..."
    certs_file = "https://portal.trustauthority.intel.com"
    allow_unmatched_policy = true

    [storage_backend]
    storage_type = "LocalFs"

    [storage_backend.backends.local_fs]
    dir_path = "/opt/confidential-containers/storage"

    [policy_engine]
    policy_path = "/opt/confidential-containers/storage/kbs/resource-policy.rego"

    [[plugins]]
    name = "resource"
    storage_backend_type = "kvstorage"
